name: Code Quality Checks

on:
  pull_request:
    branches: ["main", "master", "dev"]
  push:
    branches: ["dev"]

jobs:
  linting:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-poetry-quality-${{ hashFiles('**/poetry.lock') }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "1.8.3"

      - name: Install Dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --only dev

      - name: Run Flake8
        run: |
          poetry run flake8 src scripts tests \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=.venv,__pycache__,*.pyc,.git,__init__.py \
            --count \
            --statistics
        continue-on-error: true

      - name: Check Code Formatting with Black
        run: |
          poetry run black --check --diff src scripts tests
        continue-on-error: true

  type-checking:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "1.8.3"

      - name: Install Dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Check for Common Issues
        run: |
          echo "Checking for print statements in production code..."
          ! grep -r "print(" src/ || echo "⚠️ Found print statements in src/"
          
          echo "Checking for TODO comments..."
          grep -r "TODO" src/ || echo "✅ No TODOs found"
          
          echo "Checking for hardcoded credentials..."
          ! grep -rE "(password|secret|api_key|token)\s*=\s*['\"]" src/ || echo "⚠️ Potential hardcoded credentials"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "1.8.3"

      - name: Export Requirements
        run: |
          poetry export -f requirements.txt --output requirements-check.txt --without-hashes

      - name: Run Safety Check
        run: |
          pip install safety
          safety check --file requirements-check.txt --json || echo "⚠️ Security vulnerabilities found"
        continue-on-error: true

      - name: Check for Secrets in Code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
