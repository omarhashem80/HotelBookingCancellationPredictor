name: Test, Train & Deploy

on:
  push:
    branches: ["master", "main"]

jobs:
  test-train-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "1.8.3"

      - name: Install Dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Run Tests
        run: poetry run pytest tests/ --verbose

      - name: Train Model
        run: poetry run python scripts/train.py --models xgboost
        timeout-minutes: 30

      - name: Evaluate Model
        run: poetry run python scripts/evaluate.py

      - name: Export Model for Deployment
        run: poetry run python scripts/export_model_for_deployment.py

      - name: Setup Git for HuggingFace
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Deploy to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd Hotel-Booking
          git init
          git remote add hf https://huggingface.co/spaces/aelsayed1/Hotel-Booking || git remote set-url hf https://huggingface.co/spaces/aelsayed1/Hotel-Booking
          git fetch hf main || git fetch hf master || true
          git checkout -B main
          git add .
          git commit -m "Auto-deploy: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push https://user:$HF_TOKEN@huggingface.co/spaces/aelsayed1/Hotel-Booking main --force

      - name: Deployment Summary
        if: success()
        run: |
          echo "Pipeline completed successfully!"
          echo "Tests passed"
          echo "Model trained and evaluated"
          echo "Deployed to: https://huggingface.co/spaces/aelsayed1/Hotel-Booking"
